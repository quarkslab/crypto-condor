name: publish

on:
  workflow_run:
    workflows:
      - test
    types:
      - completed
    branches:
      - main

jobs:
  build-docs:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Build docs
        run: make pages-ci
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: docs/build/public

  pages:
    needs: [build-docs]
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - name: Publish to pages
        id: deployment
        uses: actions/deploy-pages@v4

  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-22.04
    steps:
      - run: make build-ci

  publish:
    if: success() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    needs: [pages,build]
    steps:
      - run: make publish-ci
